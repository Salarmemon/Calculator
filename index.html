<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <main id="calculator">
        <div class="display">0</div>
        <div id="buttons-container">
        <div id="numeric-buttons">
            <div class="button numeric">1</div>
            <div class="button numeric">2</div>
            <div class="button numeric">3</div>
            <div class="button numeric">4</div>
            <div class="button numeric">5</div>
            <div class="button numeric">6</div>
            <div class="button numeric">7</div>
            <div class="button numeric">8</div>
            <div class="button numeric">9</div>
            <div class="button numeric dot">.</div>
            <div class="button numeric">0</div>
            <div id="reset" class="button ">AC</div>            
        </div>

        <div id="operator-buttons">
            <div class="button">+</div>
            <div class="button">-</div>
            <div class="button">×</div>
            <div class="button">÷</div>
            <div class="button">=</div>
        </div>
        
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
